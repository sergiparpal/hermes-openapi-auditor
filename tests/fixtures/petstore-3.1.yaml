openapi: 3.1.0
info:
  title: Swagger Petstore - OpenAPI 3.1 (test fixture)
  description: |
    A minimal OpenAPI 3.1 Petstore variant used by the
    hermes-openapi-auditor test suite. Trimmed from the upstream
    petstore31.swagger.io sample to avoid the custom $id/$anchor refs
    that openapi-spec-validator cannot resolve without network access.
  version: "1.0.12"
  license:
    name: Apache 2.0
    identifier: Apache-2.0
servers:
  - url: /api/v31
paths:
  /pet:
    post:
      tags:
        - pet
      summary: Add a new pet to the store.
      description: Add a new pet to the store.
      operationId: addPet
      requestBody:
        description: Create a new pet in the store.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid input.
        "422":
          description: Validation exception.
    put:
      tags:
        - pet
      summary: Update an existing pet.
      operationId: updatePet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found.
  /pet/{petId}:
    get:
      tags:
        - pet
      summary: Find pet by ID.
      operationId: getPetById
      parameters:
        - name: petId
          in: path
          description: ID of pet to return.
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found.
components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    Pet:
      type: object
      required:
        - name
      properties:
        id:
          type: [integer, "null"]
          format: int64
          examples:
            - 10
        name:
          type: string
          examples:
            - "doggie"
        category:
          $ref: "#/components/schemas/Category"
        photoUrls:
          type: array
          items:
            type: string
        status:
          type: string
          description: Pet status in the store.
          enum:
            - available
            - pending
            - sold
