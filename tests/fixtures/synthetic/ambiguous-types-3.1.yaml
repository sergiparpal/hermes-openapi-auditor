openapi: 3.1.0
info:
  title: Ambiguous Types 3.1
  version: "1.0.0"
paths:
  /pets:
    get:
      summary: List pets
      description: Returns the registered pets.
      responses:
        "200":
          description: ok.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
              example: { id: 1, age: 5 }
        "500":
          description: Server error.
components:
  schemas:
    Pet:
      type: object
      properties:
        id: { type: integer }
        # `nullable: true` is invalid in 3.1 -- triggers the rule.
        nickname:
          type: string
          nullable: true
        # boolean exclusiveMinimum (3.0-style) -- triggers the rule.
        age:
          type: integer
          minimum: 0
          exclusiveMinimum: true
        # Numeric exclusiveMinimum is correct for 3.1 -- should NOT trigger.
        weight:
          type: number
          exclusiveMinimum: 0
        # 3.1-style nullable via type array -- should NOT trigger.
        deactivated_at:
          type: [string, "null"]
          format: date-time
      additionalProperties: false
      example: { id: 1, age: 5 }
