openapi: 3.0.3
info:
  title: Clean
  version: "1.0.0"
paths:
  /pets:
    get:
      summary: List pets
      description: Returns the registered pets.
      responses:
        "200":
          description: A pet list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
              example:
                - { id: 1, name: Rex }
        "500":
          description: Server error.
components:
  schemas:
    Pet:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string, minLength: 1 }
      example: { id: 1, name: Rex }
