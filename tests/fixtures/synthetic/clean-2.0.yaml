swagger: "2.0"
info:
  title: Clean 2.0
  version: "1.0.0"
paths:
  /pets:
    get:
      summary: List pets
      description: Returns the registered pets.
      parameters:
        - name: status
          in: query
          type: string
          enum: [available, pending, sold]
      responses:
        "200":
          description: A pet list.
          schema:
            type: array
            items:
              $ref: "#/definitions/Pet"
          examples:
            application/json:
              - { id: 1, name: Rex }
        "500":
          description: Server error.
definitions:
  Pet:
    type: object
    additionalProperties: false
    required: [id, name]
    properties:
      id: { type: integer, format: int64 }
      name: { type: string, minLength: 1 }
    example: { id: 1, name: Rex }
